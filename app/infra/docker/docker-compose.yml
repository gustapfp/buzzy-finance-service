name: buzzy-finance-local
services:
  postgresql:
    container_name: buzzy_finance_db_local
    image: postgres:16.0-alpine3.18
    ports:
      - "5432:5432"
    volumes:
      - buzzy_finance_postgresql_local:/var/lib/postgresql/data
      - buzzy_finance_postgresql_local:/backups
    env_file:
      - ../../../.env.development
  postgresql_test:
    container_name: buzzy_finance_db_test
    image: postgres:16.0-alpine3.18
    ports:
      - "5433:5432"
    volumes:
      - buzzy_finance_postgresql_test:/var/lib/postgresql/data
      - buzzy_finance_postgresql_test:/backups
    env_file:
      - ../../../.env.test
volumes:
  buzzy_finance_postgresql_local: {}
  buzzy_finance_postgresql_test: {}
